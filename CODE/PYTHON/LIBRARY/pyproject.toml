[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "senselogic-gson"
version = "0.1.9"
description = "Granular Structured Object Notation."
readme = "README.md"
requires-python = ">=3.8"
authors = [
    { name = "Eric Pelzer", email = "ecstatic.coder@gmail.com" },
]
license = "LGPL-3.0-only"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]

[project.urls]
Homepage = "https://github.com/senselogic/GSON"
Repository = "https://github.com/senselogic/GSON"

[tool.setuptools]
# Expose this directory as the installable package `senselogic_gson`
packages = ["senselogic_gson"]
package-dir = { "senselogic_gson" = "." }

